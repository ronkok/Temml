<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1">
	<title>Investigate</title>
   <link rel="stylesheet" type="text/css" href="../site/assets/Temml-Latin-Modern.css">
   <script src="./temml.js"></script>
   <style>
      body {
      margin: 0;
      padding: 0;
      font-size: 24px;
      }

      .math {
          font-size: 24px;
      }

      #input {
          margin: 0;
          font-size: 100%;
          width: 100%;
          box-sizing: border-box;
      }
      .tml-eqn::before {
    counter-increment: tmlEqnNo;
    content: "(" counter(tmlEqnNo) ")";
}
   </style>
</head>

<p>
  <math>
  <mrow>
    <mrow>
      <mrow class="menclose">
        <mrow class="ff-narrow">
          <mrow>
            <mi style="color:black;">B</mi>
          </mrow>
        </mrow>
        <mrow class="tml-cancelto" style="color:red">
          <mphantom style="padding-right:0.2em;">
            <mrow>
              <mi style="color:black;">B</mi>
            </mrow>
          </mphantom>
        </mrow>
      </mrow>
      <mover>
        <mspace height="1em"></mspace>
        <mpadded width="0.1px">
          <mspace width="0.2em"></mspace>
          <mn>6</mn>
        </mpadded>
      </mover>
    </mrow>
    <mrow class="ff-nudge-left"></mrow>
  </mrow>
</math>
</p>

<p>
<math>
  <mrow>
    <menclose notation="updiagonalstrike" style="color:#ff0000;">
      <mrow>
        <mi style="color:black;">B</mi>
      </mrow>
      <mrow class="tml-cancel upstrike"></mrow>
    </menclose>
  </mrow>
</math>
</p>

<p>
  <math>
    <msqrt>
      <msup>
        <mi>x</mi>
        <mi>c</mi>
      </msup>
    </msqrt>
    <msqrt>
      <msup style="math-shift: compact">
        <mi>x</mi>
        <mi>c</mi>
      </msup>
    </msqrt>
  </math>
</p>

</body>
</html>
