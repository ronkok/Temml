<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1">
	<title>Investigate</title>
   <link rel="stylesheet" type="text/css" href="../site/assets/Temml-Latin-Modern.css">
   <script src="./temml.js"></script>
   <style>
      body {
      margin: 0;
      padding: 0;
      font-size: 24px;
      }

      .math {
          font-size: 24px;
      }

      #input {
          margin: 0;
          font-size: 100%;
          width: 100%;
          box-sizing: border-box;
      }
      .tml-eqn::before {
    counter-increment: tmlEqnNo;
    content: "(" counter(tmlEqnNo) ")";
}
   </style>
</head>

<p>
  <math display="block" class="tml-display" style="display:block math;">
    <mrow>
      <mn>3</mn>
      <mrow>
        <mrow class="menclose">
          <mrow class="ff-narrow">
            <mn>55</mn>
          </mrow>
            <mrow class="tml-cancelto">
            <mphantom style="padding-right:0.2em;">
              <mn>55</mn>
            </mphantom>
          </mrow>
        </mrow>
        <mover>
          <mphantom>
            <mpadded width="0.1px">
              <mn>55</mn>
            </mpadded>
          </mphantom>
          <mpadded width="0.1px">
            <mspace width="0.2em"></mspace>
            <mn>6</mn>
          </mpadded>
        </mover>
      </mrow>
      <mrow class="ff-nudge-left"></mrow>
      <mn>6</mn>
    </mrow>
  </math>
</p>

<p>
  <math>
    <msqrt>
      <msup>
        <mi>x</mi>
        <mi>c</mi>
      </msup>
    </msqrt>
    <msqrt>
      <msup style="math-shift: compact">
        <mi>x</mi>
        <mi>c</mi>
      </msup>
    </msqrt>
  </math>
</p>

</body>
</html>
